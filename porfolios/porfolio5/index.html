<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Studio Néon — Portfolio 3D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <base target="_blank" />
  </head>
  <body>
    <!-- Cursor -->
    <div id="cursor">
      <div class="ring outer"></div>
      <div class="ring inner"></div>
      <div class="dot"></div>
    </div>

    <!-- Nav -->
    <nav id="main-nav">
      <button class="nav-btn active" data-section="0">
        <span class="nav-pip"></span>
        <span class="nav-label">Studio</span>
      </button>
      <button class="nav-btn" data-section="1">
        <span class="nav-pip"></span>
        <span class="nav-label">Work</span>
      </button>
      <button class="nav-btn" data-section="2">
        <span class="nav-pip"></span>
        <span class="nav-label">About</span>
      </button>
      <button class="nav-btn" data-section="3">
        <span class="nav-pip"></span>
        <span class="nav-label">Contact</span>
      </button>
    </nav>

    <!-- Corners -->
    <div class="corner" id="c-tl">Three.js — Portfolio</div>
    <div class="corner" id="c-tr">Theme #1</div>
    <div class="corner" id="c-bl">© Studio Néon 2025</div>
    <div class="corner" id="c-br">Fullscreen ↗</div>

    <!-- Counters -->
    <div id="section-counter">01 / 04</div>
    <div id="scroll-hint">
      <span>Scroll</span>
      <div class="arrow"></div>
    </div>
    <div id="rnd-hint">Double-clic → apparence aléatoire</div>

    <!-- Click hint -->
    <div id="click-hint">
      <span>Cliquez sur un objet</span>
      <div class="hint-pulse"></div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay">
      <div id="modal-backdrop"></div>
      <div id="modal-container">
        <button id="modal-close" aria-label="Fermer">
          <span></span><span></span>
        </button>
        <div id="modal-content">
          <div id="modal-header">
            <div id="modal-tag">PROJET</div>
            <h2 id="modal-title">Titre du Projet</h2>
            <div id="modal-meta">
              <span id="modal-year">2024</span>
              <span class="meta-sep">—</span>
              <span id="modal-category">Web Design</span>
              <span class="meta-sep">—</span>
              <span id="modal-client">Client Name</span>
            </div>
          </div>
          <div id="modal-body">
            <div id="modal-visual">
              <div id="modal-image">
                <img id="modal-img" src="" alt="Project preview" />
                <div class="img-shimmer"></div>
              </div>
              <div id="modal-stats">
                <div class="stat">
                  <span class="stat-value" id="stat-duration">3 mois</span>
                  <span class="stat-label">Durée</span>
                </div>
                <div class="stat">
                  <span class="stat-value" id="stat-team">4 pers.</span>
                  <span class="stat-label">Équipe</span>
                </div>
                <div class="stat">
                  <span class="stat-value" id="stat-tech">React</span>
                  <span class="stat-label">Stack</span>
                </div>
              </div>
            </div>
            <div id="modal-text">
              <p id="modal-description">Description du projet...</p>
              <div id="modal-tags"></div>
              <div id="modal-actions">
                <a href="#" id="modal-link" target="_blank" rel="noopener">
                  <span>Voir le projet</span>
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M7 17L17 7M17 7H7M17 7v10" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        </div>
        <div id="modal-decoration">
          <div class="deco-line"></div>
          <div class="deco-line"></div>
          <div class="deco-line"></div>
        </div>
      </div>
    </div>

    <!-- Swipe hint (mobile only) -->
    <div id="swipe-hint">
      <span>Swipe up/down</span>
      <div class="swipe-icon"></div>
    </div>

    <!-- BOTÓN DE COMPRA (animación) -->
    <a href="./confirmar/index.html">

        <div class="bg"></div>
        <svg

          width="342"

        <div class="wrap">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 221 42"
            height="42"
            width="221"
            class="path"
          >
            <path
              stroke-linecap="round"
              stroke-width="3"
              d="M182.674 2H203C211.837 2 219 9.16344 219 18V24C219 32.8366 211.837 40 203 40H18C9.16345 40 2 32.8366 2 24V18C2 9.16344 9.16344 2 18 2H47.8855"
            ></path>
          </svg>
          <div class="outline"></div>
          <div class="content">
            <span class="char state-1">
              <span data-label="c" style="--i: 1">c</span>
              <span data-label="o" style="--i: 2">o</span>
              <span data-label="m" style="--i: 3">m</span>
              <span data-label="p" style="--i: 4">p</span>
              <span data-label="r" style="--i: 5">r</span>
              <span data-label="a" style="--i: 6">a</span>
              <span data-label="r" style="--i: 7">r</span>
              <span data-label="!" style="--i: 8">!</span>
            </span>
            <div class="icon"><div></div></div>
          </div>
        </div>
      </button>
    </a>

    <!-- Banner de descuento -->
    <a href="../../promociones/descuentos/index.html" class="discount-banner">
      <img
        src="https://i.postimg.cc/B6Br3nZ7/80off.png"
        alt="Descuento del 80%"
      />
    </a>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
